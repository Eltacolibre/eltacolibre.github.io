<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  {% feed_meta %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="masthead" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} — home">
      <span class="tok">The</span><span class="tok">Context</span><span class="tok">Window</span>
    </a>
    <p class="tagline">{{ site.tagline }}</p>
    <nav class="site-nav" aria-label="Site">
      <a href="{{ '/' | relative_url }}">Latest</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </nav>
  </header>

  <main id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.author.name }} · {{ site.title }}</p>
    <p><a href="{{ '/feed.xml' | relative_url }}">Subscribe via RSS</a> · <a href="{{ '/sitemap.xml' | relative_url }}">Sitemap</a></p>
  </footer>
</body>
</html>
